version: '3.8'
networks:
  dev:
    driver: bridge
services:
  db:
    container_name: schedule-db
    image: 'postgres:latest'
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 1.5G
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  cache:
    container_name: schedule-cache
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 1.5G
    command: ['--requirepass', '${CACHE_PASSWORD}']
    ulimits:
      memlock: -1
    volumes:
      - dragonflydata:/data
    networks:
      - dev
    environment:
      - CACHE_PASSWORD=${CACHE_PASSWORD}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${CACHE_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  api:
    container_name: schedule-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 1.5G
    ports:
      - '${PORT}:${PORT}'
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_PORT=5432
      - COOKIE_SECRET=${COOKIE_SECRET}
      - CACHE_HOST=cache
      - CACHE_USER=default
      - CACHE_PASSWORD=${CACHE_PASSWORD}
      - CACHE_PORT=6379
      - PROXY_BASE_URL=${PROXY_BASE_URL}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - CIST_CLIENT_ID=${CIST_CLIENT_ID}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  pgadmin:
    container_name: schedule-pgadmin
    image: dpage/pgadmin4:latest
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin_password}
      #- PGADMIN_CONFIG_SERVER_MODE=False
      #- PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dev
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  pgdata:
  dragonflydata:
  pgadmin_data:
